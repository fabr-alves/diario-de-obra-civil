        // --- SUAS CHAVES DO FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyDr7eviIEUdKQRAG2ahqtdDTfGOXFEG7UM",

        const DOMINIO_PADRAO = "@obra.com";

        const LOGO_URL = "https://firebasestorage.googleapis.com/v0/b/diarioobra-60aca.firebasestorage.app/o/logoconsorcio.jpg?alt=media&token=59bbd5e0-d4e8-4ba1-9fca-5b548b64b6be";

        const MAPA_PLANTA_URL = "https://firebasestorage.googleapis.com/v0/b/diarioobra-60aca.firebasestorage.app/o/Sem%20t%C3%ADtulo.png.png?alt=media&token=7a289be6-87d2-4cdd-807a-8703900d8f07";

        const COORDENADAS_MAPA = {

          "ATERRO": [25.0, 75.0],
          "CENTRO OESTE": [60.0, 45.0],

        const LOCAIS_PRODUCAO = [
          "DESCIDA D'AGUA", "CAIXARIAS", "CANALETA", "GALERIAS", "EDIFICAÇÕES", "ATERRO",
        ];

        const LOCAIS_SETOR = [
          "ADM", "ATERRO", "CENTRO OESTE", "AUSENTE", "MANUTENÇÃO PORTARIA", "PORTARIA", 
          "PROXIMA HIDROS", "ROO-02", "RQQ 01", "RQQ 02", "SUSTENTARE",
          "Norte 5 N-5", "Norte 4 N-4", "Norte 3 N-3", "Norte 2 N-2", "Norte 1 N-1",
          "Leste 1 E-1", "Leste 2 E-2", "Leste 3 E-3", "Leste 4 E-4",
          "Sul 1 S-1", "Sul 2 S-2", "Sul 3 S-3",
          "Sudeste 1 SE-1", "Sudeste 2 SE-2",
          "Sudoeste 1 SW-1", "Sudoeste 2 SW-2", "Sudoeste 3 SW-3",
